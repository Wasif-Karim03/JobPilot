name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ──────────────────────────────────────────────────────────
  # Lint + Type Check
  # ──────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (web)
        run: pnpm --filter web exec prisma generate
        env:
          DATABASE_URL: "postgresql://jobpilot:test@localhost:5432/jobpilot"

      - name: Generate Prisma client (worker)
        run: pnpm --filter worker exec prisma generate
        env:
          DATABASE_URL: "postgresql://jobpilot:test@localhost:5432/jobpilot"

      - name: Type check (shared)
        run: pnpm --filter @jobpilot/shared run type-check

      - name: Type check (web)
        run: pnpm --filter web run type-check

      - name: Type check (worker)
        run: pnpm --filter worker exec tsc --noEmit

      - name: Lint (web)
        run: pnpm --filter web run lint

  # ──────────────────────────────────────────────────────────
  # Unit Tests
  # ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter web run test
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}

  # ──────────────────────────────────────────────────────────
  # Build
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web exec prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

      - name: Build web
        run: pnpm --filter web run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          REDIS_URL: "redis://localhost:6379"
          BETTER_AUTH_SECRET: "ci-test-secret-placeholder-32chars-min"
          BETTER_AUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  # ──────────────────────────────────────────────────────────
  # E2E Tests (only on push to main, needs running app + DB)
  # ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobpilot
          POSTGRES_PASSWORD: jobpilot_ci
          POSTGRES_DB: jobpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Apply DB migrations + seed
        run: pnpm --filter web exec prisma migrate deploy && pnpm --filter web run db:seed
        env:
          DATABASE_URL: "postgresql://jobpilot:jobpilot_ci@localhost:5432/jobpilot"
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}

      - name: Build web
        run: pnpm --filter web run build
        env:
          DATABASE_URL: "postgresql://jobpilot:jobpilot_ci@localhost:5432/jobpilot"
          REDIS_URL: "redis://localhost:6379"
          BETTER_AUTH_SECRET: "ci-e2e-secret-placeholder-minimum-32chars"
          BETTER_AUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"

      - name: Start web server
        run: pnpm --filter web run start &
        env:
          DATABASE_URL: "postgresql://jobpilot:jobpilot_ci@localhost:5432/jobpilot"
          REDIS_URL: "redis://localhost:6379"
          BETTER_AUTH_SECRET: "ci-e2e-secret-placeholder-minimum-32chars"
          BETTER_AUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: pnpm --filter web run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          E2E_USER_EMAIL: "admin@jobpilot.local"
          E2E_USER_PASSWORD: "password123"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: web/test-results/
          retention-days: 7
